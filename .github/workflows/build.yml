name: Build RF Analyzer APK
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCS_REQUIRED: false  # 👈 ЭТА СТРОКА ОТКЛЮЧАЕТ ГЕНЕРАЦИЮ ДОКУМЕНТАЦИИ

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace -x generateDocs
      # 👆 Флаг -x generateDocs пропускает эту задачу
    
    - name: Find and upload APK
      id: find-apk
      run: |
        apk_file=$(find . -type f -name '*.apk' -print -quit)
        if [ -z "$apk_file" ]; then
          echo "::error::No APK file found!"
          exit 1
        fi
        echo "APK_PATH=$apk_file" >> $GITHUB_OUTPUT
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RF-Analyzer-Debug
        path: ${{ steps.find-apk.outputs.APK_PATH }}
